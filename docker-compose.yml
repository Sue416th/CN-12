version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: trailmark-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: trailmark
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: trailmark-phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "8081:80"
    restart: always
  
  milvus:
    image: milvusdb/milvus:v2.0.0
    container_name: trailmark-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    restart: always

volumes:
  mysql_data:
  milvus_data: